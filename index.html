<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página Inicial</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Botão no topo direito -->
<button id="btnTema" onclick="modoEscuro()">🌙</button>

<header>
    <h1>Bem-vindo ao meu site</h1>
    <p>Minha primeira página inicial</p>
</header>

<nav> 
    <a href="#">Início</a>
    <a href="index/treinos.html">Treino</a>
    <a href="#">Contato</a>
</nav>

<main>
    <h2>Página Inicial</h2>
    <p>Esse é um exemplo simples de página inicial feita em HTML.</p>

    <!-- Dica de treino -->
    <button onclick="mostrarDica()">Ver dica de treino 💪</button>
    <p id="dica"></p>
</main>

<footer>
    <p>© 2026 - Meu Site</p>
</footer>

<script>
function modoEscuro() {
    document.body.classList.toggle("dark");

    const botao = document.getElementById("btnTema");

    if (document.body.classList.contains("dark")) {
        botao.innerText = "☀️";
    } else {
        botao.innerText = "🌙";
    }
}

function mostrarDica() {
    const dicas = [
        "Beba bastante água 💧",
        "Mantenha a postura correta 🏋️",
        "Não pule o aquecimento 🔥",
        "Descanse entre séries 😴"
    ];

    const aleatoria = Math.floor(Math.random() * dicas.length);
    document.getElementById("dica").innerText = dicas[aleatoria];
}
</script>

</body>
</html>
